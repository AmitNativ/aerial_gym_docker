# PPO config for target_hold_task.
#
# Uses a custom asymmetric actor-critic network:
#   Actor:  obs[0:12] → FC(128)→FC(128) → GRU(64, prev_actions) → Linear → 4-dim action
#   Critic: obs[0:22] → FC(128)→FC(128) → Linear → value
#
params:
  seed: 8
  algo:
    name: a2c_continuous
  model:
    name: continuous_a2c_logstd
  load_checkpoint: False
  network:
    name: target_hold_actor_critic
    actor_obs_dim: 12
    prev_actions_dim: 4
    critic_obs_dim: 22
    actor:
      encoder_units: [128, 128]
      activation: elu
    critic:
      units: [128, 128]
      activation: elu
    rnn:
      units: 64
      layers: 1
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
  config:
    env_name: target_hold_task
    env_config:
      num_envs: 128
    name: target_hold
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    ppo: True
    learning_rate: 3e-4
    lr_schedule: adaptive
    kl_threshold: 0.016
    save_best_after: 50
    save_frequency: 200
    score_to_win: 100000
    grad_norm: 1.0
    entropy_coef: 0.005
    truncate_grads: True
    e_clip: 0.2
    clip_value: False
    num_actors: 128
    horizon_length: 96
    minibatch_size: 512
    mini_epochs: 4
    seq_length: 16
    critic_coef: 2
    normalize_input: False
    bounds_loss_coef: 0.0001
    max_epochs: 5000
    normalize_value: True
    use_diagnostics: True
    value_bootstrap: True
    use_smooth_clamp: False
    player:
      render: True
      deterministic: True
      games_num: 100000
